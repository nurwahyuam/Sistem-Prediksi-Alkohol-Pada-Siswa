<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Pakar — CBR KMeans</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #070d1c;
      --card: #0f1629;
      --border: #1a2d4d;
      --accent: #38bdf8;
      --violet: #a78bfa;
      --text: #e2e8f0;
      --muted: #64748b;
    }
    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      position: relative;
      overflow: hidden;
    }
    /* Animated background orbs */
    body::before {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(56,189,248,0.08) 0%, transparent 70%);
      top: -150px; left: -150px;
      border-radius: 50%;
      animation: float 8s ease-in-out infinite;
    }
    body::after {
      content: '';
      position: fixed;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(167,139,250,0.07) 0%, transparent 70%);
      bottom: -100px; right: -100px;
      border-radius: 50%;
      animation: float 10s ease-in-out infinite reverse;
    }
    @keyframes float {
      0%, 100% { transform: translate(0,0); }
      50%       { transform: translate(30px, 20px); }
    }

    .login-wrap {
      width: 100%; max-width: 420px;
      padding: 20px;
      position: relative; z-index: 1;
    }
    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    }
    .login-icon {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, #0ea5e9, #8b5cf6);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      margin: 0 auto 20px;
      box-shadow: 0 8px 32px rgba(56,189,248,0.25);
    }
    h4 {
      font-size: 20px; font-weight: 700;
      color: var(--text); text-align: center; margin: 0;
    }
    .sub {
      font-size: 12px; color: var(--muted);
      text-align: center; margin: 6px 0 28px;
    }
    .field-label {
      font-size: 12px; font-weight: 500;
      color: var(--muted); margin-bottom: 6px;
    }
    .field-input {
      width: 100%;
      background: #141e35;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 13.5px;
      font-family: 'Space Grotesk', sans-serif;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(56,189,248,0.12);
    }
    .input-group-icon {
      position: relative;
    }
    .input-group-icon .icon {
      position: absolute; left: 13px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted); font-size: 15px;
    }
    .input-group-icon .field-input { padding-left: 38px; }

    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, #0ea5e9, #8b5cf6);
      border: none; color: #fff;
      font-size: 14px; font-weight: 700;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.02em;
    }
    .btn-login:hover { opacity: 0.88; transform: translateY(-1px); }

    .error-box {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 12.5px; color: #f87171;
      margin-bottom: 18px;
      display: flex; align-items: center; gap: 8px;
    }
    .back-link {
      display: block; text-align: center;
      margin-top: 20px; font-size: 12px;
      color: var(--muted); text-decoration: none;
    }
    .back-link:hover { color: var(--accent); }
    .demo-box {
      margin-top: 22px;
      background: rgba(56,189,248,0.05);
      border: 1px solid rgba(56,189,248,0.15);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 11px;
      color: var(--muted);
    }
    .demo-box strong { color: var(--accent); }
    .mono { font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-icon">🔐</div>
    <h4>Ruang Pakar</h4>
    <p class="sub">CBR KMeans — Student Alcohol Risk System</p>

    {% if error %}
    <div class="error-box">
      <i class="bi bi-exclamation-circle-fill"></i>{{ error }}
    </div>
    {% endif %}

    <form action="{{ url_for('expert_login') }}" method="POST">
      <div style="margin-bottom:16px;">
        <div class="field-label">Username Pakar</div>
        <div class="input-group-icon">
          <span class="icon"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="field-input"
                 placeholder="Masukkan username" autocomplete="off" required/>
        </div>
      </div>
      <div style="margin-bottom:20px;">
        <div class="field-label">Password</div>
        <div class="input-group-icon">
          <span class="icon"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="field-input"
                 placeholder="Masukkan password" required/>
        </div>
      </div>
      <button type="submit" class="btn-login">
        <i class="bi bi-box-arrow-in-right me-1"></i>Masuk ke Ruang Pakar
      </button>
    </form>

    <a href="{{ url_for('index') }}" class="back-link">
      <i class="bi bi-arrow-left me-1"></i>Kembali ke Sistem Utama
    </a>

    <div class="demo-box">
      <div style="margin-bottom:4px; font-weight:600; color:#94a3b8;">Demo Akun:</div>
      <div><strong>Admin:</strong> <span class="mono">admin</span> / <span class="mono">admin123</span></div>
      <div><strong>Pakar:</strong> <span class="mono">pakar1</span> / <span class="mono">pakar123</span></div>
    </div>
  </div>
</div>
</body>
</html>
